# =============================================================================
# Container security scan + signing + SBOM + OSCAL transform
#
# Controls implemented by this workflow:
#   RA-5  Vulnerability Monitoring   (Trivy scan on every push)
#   SI-2  Flaw Remediation           (fixable findings reported)
#   SI-7  Software Integrity         (Cosign keyless signing)
#   SR-3  Supply Chain Controls      (SBOM generated and attached)
#   SR-4  Provenance                 (signature in Sigstore Rekor transparency log)
#   CA-7  Continuous Monitoring      (runs on every relevant push, OSCAL per run)
#   CA-2  Control Assessments        (OSCAL Assessment Results emitted)
# =============================================================================

name: container-scan

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "scripts/evidence-to-oscal.py"
      - ".github/workflows/container-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: write           # write needed to commit OSCAL output back
  packages: write
  security-events: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/medvault

jobs:
  build-scan-sign:
    name: Build, scan, sign, attest, and transform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # required for git push back

      - name: Lowercase image name
        id: img
        run: |
          echo "name=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- RA-5: Vulnerability scanning -------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Archive Trivy SARIF as evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ github.run_id }}
          path: trivy-results.sarif
          retention-days: 90

      - name: Summarize Trivy findings
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            total=$(jq '[.runs[].results[]] | length' trivy-results.sarif)
            echo "::notice::Trivy found $total fixable vulnerability findings (CRITICAL/HIGH/MEDIUM)."
          fi

      # ---- SR-3: SBOM -------------------------------------------------------
      - name: Generate SBOM with Syft
        if: github.event_name == 'push'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.img.outputs.name }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: medvault-sbom.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      # ---- SI-7 / SR-4: Cosign keyless signing + SBOM attestation -----------
      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          echo "::notice::Signed image ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }} via Sigstore keyless flow"

      - name: Attest SBOM
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate medvault-sbom.cdx.json \
            --type cyclonedx \
            ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          echo "::notice::Attached signed SBOM attestation"

      # ---- CA-2 / CA-7: Transform Trivy SARIF to OSCAL Assessment Results ---
      - name: Transform Trivy SARIF to OSCAL Assessment Results
        if: always()
        run: |
          python scripts/evidence-to-oscal.py \
            --trivy-sarif trivy-results.sarif \
            --commit "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --output "oscal/assessment-results/run-${{ github.run_id }}-container.json"

      - name: Archive OSCAL document as evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oscal-ar-container-${{ github.run_id }}
          path: oscal/assessment-results/run-${{ github.run_id }}-container.json
          retention-days: 90

      - name: Commit OSCAL document back to repo
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oscal/assessment-results/
          if git diff --cached --quiet; then
            echo "No OSCAL changes to commit"
          else
            git commit -m "ci: container-scan OSCAL Assessment Results for run ${{ github.run_id }} [skip ci]"
            git push
          fi